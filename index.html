<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Furry Union</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔝 Шапка */
header {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
    transition: 0.3s;
    z-index: 1000;
}

header img {
    height: 40px;
    margin-right: 15px;
}

header h1 {
    flex-grow: 1;
    font-size: 20px;
}

header input {
    padding: 5px;
}

/* 🖼 Главный экран */
.hero {
    height: 100vh;
    background: url("https://hrzswhyqexmuqdpwcvht.supabase.co/storage/v1/object/public/pictures/Space_BG.png") center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero .box {
    background: rgba(0,0,0,0.5);
    padding: 40px;
    border-radius: 20px;
}

/* 📦 Секции */
.section {
    padding: 80px 20px;
    text-align: center;
}

/* 🎥 Видео */
iframe {
    width: 80%;
    height: 400px;
    border: none;
}

/* 💰 Кнопка доната */
.donate-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;

    background: orange;
    border: none;
    padding: 12px 18px;

    border-radius: 12px; /* ← вот это вместо круга */
    font-size: 16px;
    cursor: pointer;

    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* 💰 Попап */
.donate-popup {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* 🔻 Футер */
footer {
    background: #111;
    color: white;
    padding: 50px;
    text-align: center;
}

footer a {
    margin: 10px;
    color: white;
    font-size: 20px;
}
</style>
</head>

<body>

<!-- 🔝 Шапка -->
<header>
    <img src="https://hrzswhyqexmuqdpwcvht.supabase.co/storage/v1/object/public/pictures/FLAG_FUN_PNG_allpng.png">
    <h1>Furry Union</h1>
    <input placeholder="Поиск...">
</header>

<!-- 🖼 Главный экран -->
<div class="hero">
  <div class="box">
    <h1>Добро пожаловать в Furry Union</h1>
    <p>Объединяем сообщество и проекты 🐾</p>
    <p>Добавляйте нас в закладки! Сайт будет расти и меняться вместе с нами!</p>

    <!-- Соцсети ВНУТРИ центра -->
    <div class="socials big">
      <a href="https://t.me/furryun" target="_blank"><i class="fab fa-telegram"></i></a>
      <a href="https://x.com/furry_union" target="_blank"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com/@furry_union" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>
  </div>
</div>

<!-- 📦 Описание -->
<div class="section">
    <h2>О проекте</h2>
    <p>Мы совершенно точно делаем что-то важное! OwO !</p>
</div>

<!-- 🎥 Видео -->
<div class="section">
    <h2>Последнее видео</h2>
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<!-- 🔻 Футер -->
<footer>
    <p>© Furry Union</p>
    <a href="https://t.me/FurryUn"><i class="fab fa-telegram"></i></a>
    <a href="https://x.com/furry_union"><i class="fab fa-twitter"></i></a>
    <a href="https://www.youtube.com/@Furry_Union"><i class="fab fa-youtube"></i></a>
</footer>

<!-- 💰 Донат -->
<button class="donate-btn" onclick="toggleDonate()">Поддержать нас💰</button>

<div class="donate-popup" id="donateBox">
    <p>Поддержать:</p>
    <a href="https://boosty.to/furryun">Boosty</a><br>
    <a href="#">Patreon</a><br>
    <a href="#">Crypto</a>
</div>

<script>
function toggleDonate() {
    let box = document.getElementById("donateBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
