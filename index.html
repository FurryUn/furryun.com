<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Furry Union</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* 🔝 Шапка */
header {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.8);
    color: white;
    display: flex;
    align-items: center;
    padding: 15px 30px;
    transition: 0.3s;
    z-index: 1000;
}

header img {
    height: 40px;
    margin-right: 15px;
}

header h1 {
    flex-grow: 1;
    font-size: 20px;
}

header input {
    padding: 5px;
}

/* 🖼 Главный экран */
.hero {
    height: 100vh;
    background: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

.hero .box {
    background: rgba(0,0,0,0.5);
    padding: 40px;
    border-radius: 20px;
}

/* 📦 Секции */
.section {
    padding: 80px 20px;
    text-align: center;
}

/* 🎥 Видео */
iframe {
    width: 80%;
    height: 400px;
    border: none;
}

/* 💰 Кнопка доната */
.donate-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: orange;
    border: none;
    padding: 15px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
}

/* 💰 Попап */
.donate-popup {
    display: none;
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* 🔻 Футер */
footer {
    background: #111;
    color: white;
    padding: 30px;
    text-align: center;
}

footer a {
    margin: 10px;
    color: white;
    font-size: 20px;
}
</style>
</head>

<body>

<!-- 🔝 Шапка -->
<header>
    <img src="https://via.placeholder.com/40">
    <h1>Furry Union</h1>
    <input placeholder="Поиск...">
</header>

<!-- 🖼 Главный экран -->
<div class="hero">
    <div class="box">
        <h2>Добро пожаловать</h2>
        <p>Объединяем фурри сообщество 🐾</p>
    </div>
</div>

<!-- 📦 Описание -->
<div class="section">
    <h2>О проекте</h2>
    <p>Короткое описание организации, цели и идеи.</p>
</div>

<!-- 🎥 Видео -->
<div class="section">
    <h2>Последнее видео</h2>
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
</div>

<!-- 🔻 Футер -->
<footer>
    <p>© Furry Union</p>
    <a href="#"><i class="fab fa-telegram"></i></a>
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-youtube"></i></a>
</footer>

<!-- 💰 Донат -->
<button class="donate-btn" onclick="toggleDonate()">💰</button>

<div class="donate-popup" id="donateBox">
    <p>Поддержать:</p>
    <a href="#">Boosty</a><br>
    <a href="#">Patreon</a><br>
    <a href="#">Crypto</a>
</div>

<script>
function toggleDonate() {
    let box = document.getElementById("donateBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
